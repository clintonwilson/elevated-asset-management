<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#1f2a44"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#sky)"/>
  <path d="M0 610 C240 560, 420 660, 680 610 C980 550, 1150 640, 1600 590 L1600 900 L0 900 Z" fill="#0a0f1b"/>
  <path d="M0 650 C240 600, 420 700, 680 650 C980 590, 1150 690, 1600 630 L1600 900 L0 900 Z" fill="#070b14"/>

  <!-- subtle light sweep -->
  <rect x="-200" y="120" width="900" height="560" fill="url(#glow)" transform="rotate(-10 0 0)" filter="url(#soft)"/>

  <!-- simplified Worcester triple-decker silhouettes -->
  <g fill="#111827" opacity="0.95">
    <rect x="140" y="360" width="260" height="340" rx="10"/>
    <rect x="470" y="390" width="240" height="310" rx="10"/>
    <rect x="760" y="340" width="300" height="360" rx="10"/>
    <rect x="1100" y="400" width="320" height="300" rx="10"/>
  </g>

  <!-- windows -->
  <g fill="#e5e7eb" opacity="0.25">
    <!-- building 1 -->
    <g transform="translate(165 390)">
      <rect width="52" height="36" rx="6"/><rect x="74" width="52" height="36" rx="6"/><rect x="148" width="52" height="36" rx="6"/>
      <rect y="64" width="52" height="36" rx="6"/><rect x="74" y="64" width="52" height="36" rx="6"/><rect x="148" y="64" width="52" height="36" rx="6"/>
      <rect y="128" width="52" height="36" rx="6"/><rect x="74" y="128" width="52" height="36" rx="6"/><rect x="148" y="128" width="52" height="36" rx="6"/>
      <rect y="192" width="52" height="36" rx="6"/><rect x="74" y="192" width="52" height="36" rx="6"/><rect x="148" y="192" width="52" height="36" rx="6"/>
    </g>
    <!-- building 3 -->
    <g transform="translate(800 370)">
      <rect width="56" height="38" rx="6"/><rect x="80" width="56" height="38" rx="6"/><rect x="160" width="56" height="38" rx="6"/>
      <rect y="70" width="56" height="38" rx="6"/><rect x="80" y="70" width="56" height="38" rx="6"/><rect x="160" y="70" width="56" height="38" rx="6"/>
      <rect y="140" width="56" height="38" rx="6"/><rect x="80" y="140" width="56" height="38" rx="6"/><rect x="160" y="140" width="56" height="38" rx="6"/>
      <rect y="210" width="56" height="38" rx="6"/><rect x="80" y="210" width="56" height="38" rx="6"/><rect x="160" y="210" width="56" height="38" rx="6"/>
    </g>
  </g>

  <!-- label -->
  <g fill="#ffffff" opacity="0.14">
    <text x="80" y="120" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="44" font-weight="800">Worcester County</text>
  </g>
</svg>
